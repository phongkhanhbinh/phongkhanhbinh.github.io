<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Legal documentation for Sudoku Saga">
    <title>Sudoku Saga - Legal Documents</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --accent-color: #4a90e2;
            --card-bg: #fff;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --accent-color: #64b5f6;
                --card-bg: #1e1e1e;
                --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            }
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            width: 90%;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(135deg, var(--accent-color), #8e44ad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-color);
            opacity: 0.8;
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-color), #8e44ad);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1rem;
            color: var(--accent-color);
        }

        .card p {
            margin: 0;
            opacity: 0.8;
            flex-grow: 1;
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .footer {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.6;
        }

        /* Glassmorphism effects */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
        }

        @media (max-width: 600px) {
            .glass-panel {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
    <!-- Import Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container glass-panel">
        <h1>Sudoku Saga</h1>
        <p class="subtitle">Legal Documentation & Policies</p>
        
        <div class="grid">
            <a href="docs/SudokuSaga/TermsConditions.html" class="card">
                <div class="card-icon">📜</div>
                <h2>Terms & Conditions</h2>
                <p>Read the terms, conditions, and rules that govern your use of Sudoku Saga.</p>
            </a>
            
            <a href="docs/SudokuSaga/PrivacyPolicy.html" class="card">
                <div class="card-icon">🛡️</div>
                <h2>Privacy Policy</h2>
                <p>Learn how we collect, use, and protect your personal information and data.</p>
            </a>
        </div>

        <div class="footer">
            &copy; 2026 Sudoku Saga. All rights reserved.
        </div>
    </div>
</body>
</html>
